<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida RPG</title>
<link rel="stylesheet" href="style.css">

<script>
/* 🔐 BLOQUEIO DE LOGIN */
if(!localStorage.getItem("usuarioLogado")){
  window.location.href = "";
}
</script>

</head>

<body>

<h1>⚔️ Vida RPG</h1>

<!-- 👑 MOSTRA USUÁRIO + LOGOUT -->
<div style="position:absolute; top:10px; right:20px;">
  <span id="usuarioTopo"></span>
  <button onclick="logout()">Sair</button>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">
<button onclick="abrirTela('status')">📊 Status</button>
<button onclick="abrirTela('monstros')">⚔️ Monstros</button>
<button onclick="abrirTela('loja')">🏪 Loja</button>
<button onclick="abrirTela('logTela')">📜 Log</button>
<button onclick="abrirTela('pets')">🐾 Pets</button>
<button onclick="abrirTela('mochila')">🎒 Mochila</button>
</div>

<!-- STATUS -->
<div id="status" class="tela ativa">

<h2 id="nome">Herói</h2>
<p>Nível: <span id="nivel">1</span></p>

<div class="barra">
<div id="xpBar"></div>
</div>

<div class="status-area">

<canvas id="graficoAtributos" width="220" height="220"></canvas>

<div class="stats">
<p>Ataque: <span id="forca">0</span></p>
<p>Inteligência: <span id="inteligencia">0</span></p>
<p>Carisma: <span id="carisma">0</span></p>
<p>OURO: <span id="ouro">0</span></p>

<hr>

<h4>🎒 Inventário</h4>
<div id="inventario"></div>

</div>
</div>

<p>❤️ Vida</p>
<div class="barra">
<div id="vidaJogadorBar"></div>
</div>

<p>⚡ Energia</p>
<div class="barra">
<div id="energiaBar"></div>
</div>

</div>

<!-- MONSTROS -->
<div id="monstros" class="tela">

<div class="area-batalha">

<div class="monstro-box">

<img id="imgMonstro" src="" class="img-monstro">

<p id="monstroNome">Nenhum monstro</p>

<div class="vida-monstro-ui">
<span id="vidaMonstroTexto">0 / 0</span>

<div class="barra">
<div id="vidaMonstroBar"></div>
</div>

</div>

</div>
</div>

<p>❤️ Sua Vida:
<span id="vidaJogadorTexto">100 / 100</span>
</p>

<div class="barra">
<div id="vidaJogadorBar"></div>
</div>

<h3>🎒 Bolsa</h3>
<div id="bolsaBatalha"></div>

<hr>

<button onclick="gerarMonstro()">🔎 Procurar</button>
<button onclick="atacar()">⚔️ Atacar</button>

<h3>📜 Batalha</h3>
<div id="logBatalha" class="log-batalha"></div>

</div>

<!-- LOJA -->
<div id="loja" class="tela">
<h3>🏪 Loja do Dia</h3>
<div id="itensLoja"></div>
</div>

<!-- MOCHILA -->
<div id="mochila" class="tela">
<h3>🎒 Mochila</h3>
<div id="listaItens"></div>
</div>

<!-- PETS -->
<div id="pets" class="tela">
<h3>🐾 Seus Pets</h3>
<button onclick="comprarOvo()">🐣 Comprar Ovo (100 ouro)</button>
<hr>
<div id="listaPets"></div>
</div>

<!-- LOG GERAL -->
<div id="logTela" class="tela">
<div id="log" class="log"></div>
</div>

</div>

<script>

/* 👤 MOSTRAR USUÁRIO */
document.getElementById("usuarioTopo").innerText =
"👤 " + localStorage.getItem("usuarioLogado");

/* 🚪 LOGOUT */
function logout(){
localStorage.removeItem("usuarioLogado");
window.location.href = "login.html";
}

</script>

<script src="script.js"></script>

</body>

</html>
